<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAR Narrative Generation - Reloading</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

/* Background */

body{
background:#0d1117;
color:#e6edf3;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
text-align:center;
}

/* Animated wave canvas */

#waveCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* Content container (NO BOX NOW) */

.reload-container{
position:relative;
z-index:2;
width:420px;
padding:20px;
}

/* Logo */

.logo{
font-family:"Orbitron",sans-serif;
font-size:32px;
letter-spacing:4px;
color:#58a6ff;
margin-bottom:12px;
}

/* Titles */

.title{
font-size:18px;
margin-bottom:8px;
}

.subtitle{
font-size:13px;
color:#8b949e;
margin-bottom:30px;
}

/* Loader */

.loader{
width:48px;
height:48px;
border:4px solid rgba(255,255,255,0.15);
border-top:4px solid #58a6ff;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
margin-bottom:25px;
}

@keyframes spin{
0%{ transform:rotate(0deg);}
100%{ transform:rotate(360deg);}
}

/* Progress bar */

.progress-container{
width:100%;
height:6px;
background:#30363d;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
width:0%;
background:#58a6ff;
animation:progress 1.2s linear forwards;
}

@keyframes progress{
0%{width:0%;}
100%{width:100%;}
}

/* Footer */

.footer{
margin-top:25px;
font-size:12px;
color:#6e7681;
}

</style>
</head>

<body>

<canvas id="waveCanvas"></canvas>

<div class="reload-container">

<div class="logo">HACK IT OUT</div>

<div class="title">
Reloading SAR Narrative System
</div>

<div class="subtitle">
Updating case intelligence and transaction insights
</div>

<div class="loader"></div>

<div class="progress-container">
<div class="progress-bar"></div>
</div>

<div class="footer">
Preparing analytics dashboard...
</div>

</div>

<script>

/* Wave animation */

const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let time = 0;

function drawWave(offset,opacity){

ctx.beginPath();
ctx.lineWidth = 1.5;
ctx.strokeStyle = `rgba(88,166,255,${opacity})`;

for(let x=0;x<canvas.width;x++){

let y =
Math.sin((x*0.01)+time)*40 +
Math.sin((x*0.02)+time*0.7)*20 +
canvas.height/2 + offset;

if(x===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}

}

ctx.stroke();
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<14;i++){
drawWave((i-7)*15,0.08 + i*0.02);
}

time += 0.02;

requestAnimationFrame(animate);

}

animate();


/* Return to previously active route after refresh */

const RELOAD_TARGET_KEY = "sarGuardian.reloadTarget";
const FALLBACK_ROUTE = "/";
const params = new URLSearchParams(window.location.search);
const isEmbedded = params.get("embedded") === "1" || window.self !== window.top;

if (!isEmbedded) {
const targetRoute = sessionStorage.getItem(RELOAD_TARGET_KEY) || FALLBACK_ROUTE;

setTimeout(() => {
window.location.replace(targetRoute);
}, 1200);

setTimeout(() => {
window.location.replace(FALLBACK_ROUTE);
}, 6000);
}

</script>

</body>
</html>
